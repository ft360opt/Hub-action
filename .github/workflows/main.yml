name: Auto Fetch Nodes

on:
  schedule:
    # 每 4 小时自动执行一次 (UTC 时间)
    - cron: '0 */4 * * *'
  workflow_dispatch: # 允许你在 GitHub 页面上点击按钮手动触发

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape Nodes
    runs-on: ubuntu-latest
    steps:
      # 升级至最新版本以兼容 Node 24 运行环境
      - name: Checkout
        uses: actions/checkout@v4

      # 升级至最新版本以兼容 Node 24 运行环境
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # 保持你要求的最新 Python 3.12 版本
          cache: 'pip' # Speeds up execution by caching pip packages

      - name: Install dependencies
        run: pip install pyyaml requests

      # ✨ 新增：为 GitHub Actions 环境预装 Mihomo（可选，加快速度）
      #- name: Pre-download Mihomo (GitHub Actions optimization)
      #  if: runner.os == 'Linux'
      #  run: |
      #    python -c "
      #    import os
      #    os.environ['GITHUB_ACTIONS'] = 'true'
      #    from debug_nodes_mihomo import download_mihomo_core
      #    download_mihomo_core()
      #    "
          
      - name: Execute Fetch Script
        env:
          # 关键一步：注入内置 Token，防止 Python 脚本搜索 GitHub API 时被限流
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python fetch_nodes.py

      - name: Save datestamp
        run: date > ./data/latest-scrape.txt

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@:github.com"
          git add ./data/
          # 检查是否有文件变动，有变动则提交，没有则跳过，防止 Actions 报错死循环
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto updated nodeALL.txt and nodes.txt: $(date)" && git push)
